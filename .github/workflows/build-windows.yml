name: Build Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-libshumate
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-gettext-tools
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-fontconfig
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-graphene
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-librsvg
            mingw-w64-x86_64-adwaita-icon-theme
            mingw-w64-x86_64-hicolor-icon-theme
            mingw-w64-x86_64-libsoup3
            mingw-w64-x86_64-json-glib
            mingw-w64-x86_64-protobuf-c
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-appstream
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad

      - name: Configure cargo linker flags for Windows
        shell: msys2 {0}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-pc-windows-gnu]
          rustflags = [
            "-C", "link-args=-ladvapi32 -lshell32 -lole32 -lshlwapi -lws2_32 -luserenv -lntdll -liconv -lcrypt32",
          ]
          EOF

      - name: Build release
        shell: msys2 {0}
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: "/mingw64/lib/pkgconfig:/mingw64/share/pkgconfig"
          RUSTFLAGS: "-C link-args=-liconv"
          OPENSSL_DIR: "/mingw64"
          OPENSSL_LIB_DIR: "/mingw64/lib"
          OPENSSL_INCLUDE_DIR: "/mingw64/include"
        run: |
          export PATH="/c/Users/${USER}/.cargo/bin:${PATH}"
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Package distribution
        shell: msys2 {0}
        run: |
          VERSION="${GITHUB_REF_NAME:-0.1.0}"
          DIST="dist/qr-studio-${VERSION}-windows-x86_64"
          MINGW="/mingw64"

          mkdir -p "${DIST}"

          # Copy binary
          cp target/x86_64-pc-windows-gnu/release/qr_studio.exe "${DIST}/"

          # Copy build tools needed for packaging (removed later)
          cp "${MINGW}/bin/glib-compile-schemas.exe" "${DIST}/"
          cp "${MINGW}/bin/gdk-pixbuf-query-loaders.exe" "${DIST}/"
          cp "${MINGW}/bin/gdbus.exe" "${DIST}/" 2>/dev/null || true

          # Copy ALL DLLs from mingw64/bin to ensure no dependencies are missed.
          # This is the most reliable approach — the extra size (~30MB) is acceptable
          # compared to the alternative of missing DLLs at runtime.
          echo "=== Copying all DLLs from ${MINGW}/bin ==="
          cp "${MINGW}/bin/"lib*.dll "${DIST}/" 2>/dev/null || true
          echo "Copied $(ls "${DIST}/"lib*.dll 2>/dev/null | wc -l) DLLs"
          # Also copy gcc runtime DLLs (libgcc, libstdc++, libwinpthread, libssp)
          cp "${MINGW}/bin/"libgcc*.dll "${DIST}/" 2>/dev/null || true
          cp "${MINGW}/bin/"libstdc*.dll "${DIST}/" 2>/dev/null || true
          cp "${MINGW}/bin/"libwinpthread*.dll "${DIST}/" 2>/dev/null || true
          cp "${MINGW}/bin/"libssp*.dll "${DIST}/" 2>/dev/null || true

          # Copy GTK schemas
          mkdir -p "${DIST}/share/glib-2.0/schemas"
          cp "${MINGW}/share/glib-2.0/schemas/"*.xml "${DIST}/share/glib-2.0/schemas/"
          if [ -f "${MINGW}/share/glib-2.0/schemas/gschemas.compiled" ]; then
            cp "${MINGW}/share/glib-2.0/schemas/gschemas.compiled" "${DIST}/share/glib-2.0/schemas/"
          fi

          # Compile schemas in the dist
          cd "${DIST}/share/glib-2.0/schemas"
          "${DIST}/glib-compile-schemas.exe" . 2>/dev/null || true
          cd -

          # Copy GDK-Pixbuf loaders
          mkdir -p "${DIST}/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          cp "${MINGW}/lib/gdk-pixbuf-2.0/2.10.0/loaders/"*.dll "${DIST}/lib/gdk-pixbuf-2.0/2.10.0/loaders/"

          # Generate loaders cache with relative paths
          cd "${DIST}"
          "./gdk-pixbuf-query-loaders.exe" > "lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          sed -i 's|C:/[^"]*/mingw64/lib/|lib/|g' "lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          cd -

          # Copy icons (Adwaita + hicolor)
          mkdir -p "${DIST}/share/icons"
          cp -r "${MINGW}/share/icons/Adwaita" "${DIST}/share/icons/" 2>/dev/null || true
          cp -r "${MINGW}/share/icons/hicolor" "${DIST}/share/icons/" 2>/dev/null || true

          # Copy GStreamer plugins (needed by GTK4 media support)
          mkdir -p "${DIST}/lib/gstreamer-1.0"
          for plugin in "${MINGW}/lib/gstreamer-1.0/"*.dll; do
            if [ -f "${plugin}" ]; then
              cp "${plugin}" "${DIST}/lib/gstreamer-1.0/"
            fi
          done

          # Copy libsoup3 and libshumate GI typelibs (for libshumate runtime)
          mkdir -p "${DIST}/lib/girepository-1.0"
          for typelib in Shumate-1.0.typelib Soup-3.0.typelib; do
            if [ -f "${MINGW}/lib/girepository-1.0/${typelib}" ]; then
              cp "${MINGW}/lib/girepository-1.0/${typelib}" "${DIST}/lib/girepository-1.0/"
            fi
          done 2>/dev/null || true

          # Copy GTK4 settings
          mkdir -p "${DIST}/share/gtk-4.0"
          cp "${MINGW}/share/gtk-4.0/settings.ini" "${DIST}/share/gtk-4.0/" 2>/dev/null || true

          # Remove build tools from dist (not needed at runtime)
          rm -f "${DIST}/glib-compile-schemas.exe"
          rm -f "${DIST}/gdk-pixbuf-query-loaders.exe"
          rm -f "${DIST}/gdbus.exe"

          # Create ZIP
          cd dist
          tar -a -c -f "qr-studio-${VERSION}-windows-x86_64.zip" "qr-studio-${VERSION}-windows-x86_64/"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-studio-windows-x86_64
          path: dist/*.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
