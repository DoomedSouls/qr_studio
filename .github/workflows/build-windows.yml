name: Build Windows

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: mingw64
          update: true
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-libadwaita
            mingw-w64-x86_64-libshumate
            mingw-w64-x86_64-gettext
            mingw-w64-x86_64-gettext-tools
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-pango
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-harfbuzz
            mingw-w64-x86_64-freetype
            mingw-w64-x86_64-fontconfig
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-graphene
            mingw-w64-x86_64-pcre2
            mingw-w64-x86_64-librsvg
            mingw-w64-x86_64-adwaita-icon-theme
            mingw-w64-x86_64-hicolor-icon-theme
            mingw-w64-x86_64-libsoup3
            mingw-w64-x86_64-json-glib
            mingw-w64-x86_64-protobuf-c
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-appstream
            mingw-w64-x86_64-gstreamer
            mingw-w64-x86_64-gst-plugins-good
            mingw-w64-x86_64-gst-plugins-bad

      - name: Configure cargo linker flags for Windows
        shell: msys2 {0}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.x86_64-pc-windows-gnu]
          rustflags = [
            "-C", "link-args=-ladvapi32 -lshell32 -lole32 -lshlwapi -lws2_32 -luserenv -lntdll -liconv -lcrypt32",
          ]
          EOF

      - name: Build release
        shell: msys2 {0}
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: "/mingw64/lib/pkgconfig:/mingw64/share/pkgconfig"
          RUSTFLAGS: "-C link-args=-liconv"
          OPENSSL_DIR: "/mingw64"
          OPENSSL_LIB_DIR: "/mingw64/lib"
          OPENSSL_INCLUDE_DIR: "/mingw64/include"
        run: |
          export PATH="/c/Users/${USER}/.cargo/bin:${PATH}"
          cargo build --release --target x86_64-pc-windows-gnu

      # ─── MSIX Packaging ────────────────────────────────────────────────

      - name: Install ImageMagick for icon generation
        shell: powershell
        run: choco install imagemagick --yes --no-progress

      - name: Generate self-signed code signing certificate
        shell: powershell
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=QR Studio, O=SlobCoder" `
            -KeyUsage DigitalSignature `
            -FriendlyName "QR Studio MSIX Signing" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")

          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"

          # Export PFX with private key
          $pfxPassword = ConvertTo-SecureString -String "QRStudio" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath "QRStudioSigning.pfx" -Password $pfxPassword

          # Also export the public .cer for users to install
          Export-Certificate -Cert $cert -FilePath "QRStudioSigning.cer"

          Write-Host "Certificate exported: QRStudioSigning.pfx and QRStudioSigning.cer"

          # Save thumbprint for later signing step
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Prepare MSIX layout
        shell: msys2 {0}
        run: |
          VERSION="${GITHUB_REF_NAME:-0.1.0}"
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          # Convert to 4-part version (e.g. 0.2.5 -> 0.2.5.0)
          PARTS=$(echo "$VERSION" | tr '.' '\n' | wc -l)
          if [ "$PARTS" -eq 3 ]; then
            VERSION="${VERSION}.0"
          fi

          echo "Package version: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          MINGW="/mingw64"
          LAYOUT="msix-layout"

          rm -rf "${LAYOUT}"
          mkdir -p "${LAYOUT}"

          # Copy binary
          cp target/x86_64-pc-windows-gnu/release/qr_studio.exe "${LAYOUT}/"

          # Copy country flag SVGs
          if [ -d "flags" ]; then
            cp -r flags "${LAYOUT}/flags"
            FLAG_COUNT=$(ls "${LAYOUT}/flags/"*.svg 2>/dev/null | wc -l)
            echo "Copied ${FLAG_COUNT} flag SVGs"
          fi

          # Copy ALL DLLs from mingw64/bin
          echo "=== Copying all DLLs from ${MINGW}/bin ==="
          DLL_COUNT=0
          for f in "${MINGW}/bin/"*.dll; do
            if [ -f "$f" ]; then
              cp "$f" "${LAYOUT}/"
              DLL_COUNT=$((DLL_COUNT + 1))
            fi
          done
          echo "Copied ${DLL_COUNT} DLLs"

          # Copy GTK schemas
          mkdir -p "${LAYOUT}/share/glib-2.0/schemas"
          cp "${MINGW}/share/glib-2.0/schemas/"*.xml "${LAYOUT}/share/glib-2.0/schemas/"
          if [ -f "${MINGW}/share/glib-2.0/schemas/gschemas.compiled" ]; then
            cp "${MINGW}/share/glib-2.0/schemas/gschemas.compiled" "${LAYOUT}/share/glib-2.0/schemas/"
          fi

          # Compile schemas
          cp "${MINGW}/bin/glib-compile-schemas.exe" "${LAYOUT}/"
          cd "${LAYOUT}/share/glib-2.0/schemas"
          "${LAYOUT}/glib-compile-schemas.exe" . 2>/dev/null || true
          cd -
          rm -f "${LAYOUT}/glib-compile-schemas.exe"

          # Copy GDK-Pixbuf loaders
          mkdir -p "${LAYOUT}/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          cp "${MINGW}/lib/gdk-pixbuf-2.0/2.10.0/loaders/"*.dll "${LAYOUT}/lib/gdk-pixbuf-2.0/2.10.0/loaders/"

          # Generate loaders cache with relative paths
          cp "${MINGW}/bin/gdk-pixbuf-query-loaders.exe" "${LAYOUT}/"
          cd "${LAYOUT}"
          "./gdk-pixbuf-query-loaders.exe" > "lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          sed -i 's|C:/[^"]*/mingw64/lib/|lib/|g' "lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          cd -
          rm -f "${LAYOUT}/gdk-pixbuf-query-loaders.exe"

          # Copy icons
          mkdir -p "${LAYOUT}/share/icons"
          cp -r "${MINGW}/share/icons/Adwaita" "${LAYOUT}/share/icons/" 2>/dev/null || true
          cp -r "${MINGW}/share/icons/hicolor" "${LAYOUT}/share/icons/" 2>/dev/null || true

          # Copy GStreamer plugins
          mkdir -p "${LAYOUT}/lib/gstreamer-1.0"
          for plugin in "${MINGW}/lib/gstreamer-1.0/"*.dll; do
            if [ -f "${plugin}" ]; then
              cp "${plugin}" "${LAYOUT}/lib/gstreamer-1.0/"
            fi
          done

          # Copy GI typelibs
          mkdir -p "${LAYOUT}/lib/girepository-1.0"
          for typelib in Shumate-1.0.typelib Soup-3.0.typelib; do
            if [ -f "${MINGW}/lib/girepository-1.0/${typelib}" ]; then
              cp "${MINGW}/lib/girepository-1.0/${typelib}" "${LAYOUT}/lib/girepository-1.0/"
            fi
          done 2>/dev/null || true

          # Copy GTK4 settings
          mkdir -p "${LAYOUT}/share/gtk-4.0"
          cp "${MINGW}/share/gtk-4.0/settings.ini" "${LAYOUT}/share/gtk-4.0/" 2>/dev/null || true

      - name: Generate MSIX icons
        shell: powershell
        run: |
          # Refresh PATH to pick up ImageMagick
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

          $svgPath = "data\com.example.qr_studio.svg"
          $assetsDir = "msix-layout\Assets"
          New-Item -ItemType Directory -Force -Path $assetsDir | Out-Null

          $icons = @(
            @{ Name = "Square44x44Logo.png";   W = 44;  H = 44  },
            @{ Name = "Square150x150Logo.png";  W = 150; H = 150 },
            @{ Name = "Wide310x150Logo.png";    W = 310; H = 150 },
            @{ Name = "Square310x310Logo.png";  W = 310; H = 310 },
            @{ Name = "StoreLogo.png";          W = 50;  H = 50  },
            @{ Name = "SplashScreen.png";       W = 620; H = 300 }
          )

          foreach ($icon in $icons) {
            $output = Join-Path $assetsDir $icon.Name
            magick convert -background none $svgPath -resize "$($icon.W)x$($icon.H)" -gravity center -extent "$($icon.W)x$($icon.H)" $output
            if (Test-Path $output) {
              Write-Host "  Created: $($icon.Name) ($($icon.W)x$($icon.H))"
            } else {
              Write-Error "  FAILED: $($icon.Name)"
            }
          }

      - name: Update AppxManifest version
        shell: powershell
        run: |
          $version = $env:VERSION
          $manifestPath = "windows\AppxManifest.xml"
          [xml]$manifest = Get-Content $manifestPath
          $manifest.Package.Identity.Version = $version
          $manifest.Save("$PWD\$manifestPath")
          Write-Host "Updated AppxManifest.xml version to: $version"

      - name: Copy AppxManifest to layout
        shell: powershell
        run: |
          Copy-Item "windows\AppxManifest.xml" "msix-layout\AppxManifest.xml"
          Write-Host "Copied AppxManifest.xml to msix-layout"

      - name: Create MSIX package
        shell: powershell
        run: |
          # Find MakeAppx from Windows SDK
          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\MakeAppx.exe" |
            Sort-Object { [version]($_.Directory.Name) } -Descending |
            Select-Object -First 1

          if (-not $makeAppx) {
            Write-Error "MakeAppx.exe not found!"
            exit 1
          }

          Write-Host "Using MakeAppx: $($makeAppx.FullName)"

          $version = $env:VERSION
          $msixFile = "QRStudio-${version}.msix"

          & $makeAppx.FullName pack /d msix-layout /p $msixFile /o /v
          Write-Host "Created: $msixFile"

          echo "MSIX_FILE=$msixFile" >> $env:GITHUB_ENV

      - name: Sign MSIX package
        shell: powershell
        run: |
          # Find SignTool from Windows SDK
          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object { [version]($_.Directory.Name) } -Descending |
            Select-Object -First 1

          if (-not $signTool) {
            Write-Error "signtool.exe not found!"
            exit 1
          }

          Write-Host "Using SignTool: $($signTool.FullName)"
          Write-Host "Certificate thumbprint: $env:CERT_THUMBPRINT"
          Write-Host "MSIX file: $env:MSIX_FILE"

          & $signTool.FullName sign /fd SHA256 /sha1 $env:CERT_THUMBPRINT /t http://timestamp.digicert.com $env:MSIX_FILE

          Write-Host "MSIX signed successfully!"

      - name: Create also ZIP distribution (portable)
        shell: msys2 {0}
        run: |
          VERSION="${GITHUB_REF_NAME:-0.1.0}"
          cd msix-layout
          # Remove AppxManifest.xml and Assets — only needed for MSIX
          rm -f AppxManifest.xml
          rm -rf Assets
          cd ..
          cd dist
          tar -a -c -f "qr-studio-${VERSION}-windows-x86_64.zip" -C .. "msix-layout"
          cd ..

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-studio-windows-msix
          path: |
            ${{ env.MSIX_FILE }}
            QRStudioSigning.pfx
            QRStudioSigning.cer

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-studio-windows-portable
          path: dist/*.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.MSIX_FILE }}
            QRStudioSigning.pfx
            QRStudioSigning.cer
            dist/*.zip
          body: |
            ## Installation (MSIX)

            ### Schritt 1: Zertifikat installieren
            1. `QRStudioSigning.cer` herunterladen
            2. Doppelklick → **Zertifikat installieren**
            3. **Lokaler Computer** → Weiter
            4. **Alle Zertifikate in folgendem Speicher platzieren** → **Durchsuchen** → **Vertrauenswürdige Stammzertifizierungsstellen** → OK → Weiter → Fertigstellen

            ### Schritt 2: App installieren
            1. `QRStudio-*.msix` herunterladen
            2. Doppelklick → **Installieren**

            > **Hinweis:** Das Zertifikat ist selbstsigniert. Es muss nur einmal installiert werden — danach funktionieren alle zukünftigen Updates.

            ---

            ## Portable Version (ZIP)
            Die ZIP-Datei kann an einen beliebigen Ort entpackt und `qr_studio.exe` direkt gestartet werden.
