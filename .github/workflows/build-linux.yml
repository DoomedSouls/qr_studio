name: Build Linux

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-4-dev \
            libadwaita-1-dev \
            libshumate-dev \
            libgdk-pixbuf2.0-dev \
            librsvg2-dev \
            libpango1.0-dev \
            libcairo2-dev \
            libsqlite3-dev \
            libprotobuf-c-dev \
            libsoup-3.0-dev \
            libjson-glib-dev \
            libgraphene-1.0-dev \
            libssl-dev \
            libxml2-dev \
            libepoxy-dev \
            libharfbuzz-dev \
            libfreetype-dev \
            libfontconfig1-dev \
            squashfs-tools \
            libfuse2t64

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Create AppDir
        run: |
          VERSION="${GITHUB_REF_NAME:-0.1.0}"
          APPDIR="build/QR_Studio.AppDir"
          BINARY="target/release/qr_studio"
          LIB_DIR="/usr/lib/x86_64-linux-gnu"

          mkdir -p "${APPDIR}"/usr/{bin,lib,share/{glib-2.0/schemas,icons/hicolor/scalable/apps}}
          mkdir -p "${APPDIR}/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders"

          # ── Binary ──
          cp "${BINARY}" "${APPDIR}/usr/bin/"
          chmod +x "${APPDIR}/usr/bin/qr_studio"
          strip --strip-unneeded "${APPDIR}/usr/bin/qr_studio"

          # ── Desktop file (fix Exec for AppImage) ──
          cp data/com.example.qr_studio.desktop "${APPDIR}/com.example.qr_studio.desktop"
          sed -i 's|^Exec=.*|Exec=qr_studio|' "${APPDIR}/com.example.qr_studio.desktop"

          # ── Icon ──
          cp data/com.example.qr_studio.svg "${APPDIR}/com.example.qr_studio.svg"
          cp data/com.example.qr_studio.svg "${APPDIR}/usr/share/icons/hicolor/scalable/apps/"

          # ── Shared libraries (resolved via ldd) ──
          DEPS_FILE=$(mktemp /tmp/qr_studio_deps.XXXXXX)
          ldd "${BINARY}" 2>/dev/null | awk '/=>/{print $3}' >> "$DEPS_FILE"

          # Note: librsvg and gdk-pixbuf loaders are NOT bundled because
          # the entire GTK4 rendering stack comes from the host system.

          # ═══════════════════════════════════════════════════════════
          # Exclude libraries that must come from the host system.
          #
          # GTK4/libadwaita and their entire rendering dependency tree
          # are tightly coupled with the host's GPU/display compositor.
          # Bundling Ubuntu 24.04 versions causes EGL/Vulkan init
          # failures, broken text rendering, missing icons/flags, and
          # CSS parse errors on other distros (Arch, Fedora, etc.).
          #
          # Strategy: only bundle portable utility libs (compression,
          # crypto, image formats). Let the host provide GTK4 and its
          # entire dependency chain (pango, cairo, harfbuzz, etc.).
          # ═══════════════════════════════════════════════════════════

          # GTK4/libadwaita core (must match host display compositor)
          EXCLUDE_GTK='libgtk-4|libadwaita-1|libshumate'

          # Rendering pipeline (must match host GPU drivers)
          EXCLUDE_RENDER='libgraphene-1|libepoxy|libcairo|libpixman-1'

          # Text/font rendering (must match host Pango/Harfbuzz)
          EXCLUDE_TEXT='libpango|libharfbuzz|libfribidi|libthai|libdatrie|libfreetype|libfontconfig|libgraphite2'

          # Image/SVG loading (must match host GTK4's gdk-pixbuf/librsvg)
          EXCLUDE_IMAGE='libgdk_pixbuf|librsvg|libtiff|libjpeg|libpng|libjbig|libsharpyuv|libwebp'

          # Network/data (dependencies of libshumate etc.)
          EXCLUDE_NET='libsoup-3|libjson-glib|libprotobuf-c|libsqlite3|libxml2|libxmlb'

          # GPU/display (must come from host system drivers)
          EXCLUDE_GPU='libEGL|libGL|libGLdispatch|libGLX|libGLES|libglapi|libvulkan|libdrm|libgbm|libwayland-egl|libwayland-client|libwayland-cursor'

          # X11/Wayland display
          EXCLUDE_DISPLAY='libX11|libXau|libxcb|libXcursor|libXdamage|libXdmcp|libXext|libXfixes|libXinerama|libXi|libxkbcommon|libXrandr|libXrender'

          # Combine all exclusions
          EXCLUDE_ALL="${EXCLUDE_GTK}|${EXCLUDE_RENDER}|${EXCLUDE_TEXT}|${EXCLUDE_IMAGE}|${EXCLUDE_NET}|${EXCLUDE_GPU}|${EXCLUDE_DISPLAY}"

          sort -u "$DEPS_FILE" \
            | grep -vE 'ld-linux|linux-vdso|/libc\.so|/libm\.so|/libdl\.so|/libpthread\.so|/librt\.so|/libresolv\.so|/libnss' \
            | grep -vE "${EXCLUDE_ALL}" \
            | while IFS= read -r lib; do
                  [ -f "$lib" ] && cp -Ln "$lib" "${APPDIR}/usr/lib/" 2>/dev/null || true
              done
          rm -f "$DEPS_FILE"

          echo "Bundled $(find "${APPDIR}/usr/lib" -maxdepth 1 -name '*.so*' | wc -l) libraries"

          # ── GSettings schemas ──
          SCHEMA_DST="${APPDIR}/usr/share/glib-2.0/schemas"
          for f in /usr/share/glib-2.0/schemas/org.gtk.gtk4.*.gschema.xml \
                   /usr/share/glib-2.0/schemas/org.gtk.Settings.*.gschema.xml; do
              [ -f "$f" ] && cp "$f" "$SCHEMA_DST/"
          done
          glib-compile-schemas "$SCHEMA_DST" 2>/dev/null || true

          # ── gdk-pixbuf loaders ──
          # Since we exclude libgdk_pixbuf from bundling (host provides it),
          # we also don't bundle loaders — they must match the host's pixbuf version.
          # The host's GDK_PIXBUF_MODULEDIR and loaders.cache are used automatically.
          mkdir -p "${APPDIR}/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders"
          : > "${APPDIR}/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"

          # ── AppRun entry point ──
          cat > "${APPDIR}/AppRun" << 'APPRUN'
#!/bin/sh
HERE="$(dirname "$(readlink -f "$0")")"

export LD_LIBRARY_PATH="${HERE}/usr/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
export GSETTINGS_SCHEMA_DIR="${HERE}/usr/share/glib-2.0/schemas${GSETTINGS_SCHEMA_DIR:+:${GSETTINGS_SCHEMA_DIR}}"
export XDG_DATA_DIRS="${HERE}/usr/share${XDG_DATA_DIRS:+:${XDG_DATA_DIRS}}"

exec "${HERE}/usr/bin/qr_studio" "$@"
APPRUN
          chmod +x "${APPDIR}/AppRun"

      - name: Download and extract appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp && ./appimagetool --appimage-extract >/dev/null 2>&1
          mv /tmp/squashfs-root /tmp/appimagetool-extracted

      - name: Package AppImage
        run: |
          VERSION="${GITHUB_REF_NAME:-0.1.0}"
          ARCH=x86_64
          OUTPUT="build/QR_Studio-${VERSION}-${ARCH}.AppImage"
          mkdir -p build/dist
          ARCH=x86_64 /tmp/appimagetool-extracted/AppRun build/QR_Studio.AppDir "$OUTPUT"
          mv "$OUTPUT" build/dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-studio-linux-x86_64
          path: build/dist/*.AppImage

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/*.AppImage
